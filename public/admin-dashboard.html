<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillForge - Admin Dashboard</title>
  <style>
    body{
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#111827,#1f2937,#0f766e);
      margin:0;
      padding:20px;
      color:white;
    }
    .container{ max-width:1100px; margin:0 auto; }
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
      gap:10px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }
    .card{
      background:rgba(255,255,255,0.9);
      color:#0f172a;
      border-radius:18px;
      padding:20px;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      transition:0.3s;
      font-weight:bold;
      text-align:center;
    }
    .card:hover{ transform:translateY(-5px); }
    .logout-btn{
      background:#f97316;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }
    #content{
      margin-top:30px;
      background:white;
      border-radius:18px;
      padding:20px;
      color:#0f172a;
      min-height:220px;
    }
    .item{
      background:#f9fafb;
      padding:10px;
      margin-bottom:10px;
      border-radius:10px;
      border-left:4px solid #0f766e;
      font-size:14px;
    }
    .form input,
    .form textarea{
      width:100%;
      padding:8px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #d1d5db;
      font-family:inherit;
    }
    .form button{
      padding:8px 16px;
      border:none;
      border-radius:8px;
      background:#0f766e;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }
    small{ color:#6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛠️ SkillForge Admin Dashboard</h1>
      <div>
        <span id="welcome"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card" onclick="openSection('overview')">📊 Overview</div>
      <div class="card" onclick="openSection('courses')">📚 View Courses</div>
      <div class="card" onclick="openSection('announcements')">📢 Post Announcement</div>
      <div class="card" onclick="openSection('exams')">📝 View Exams</div>
      <div class="card" onclick="openSection('quizzes')">❓ View Quizzes</div>
      <div class="card" onclick="openSection('messages')">💬 Student Messages</div>
    </div>

    <div id="content">
      <h2>Overview</h2>
      <p>Welcome, Admin. Use the cards above to view courses, exams, quizzes, announcements and student messages.</p>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("sf_token");
    const role  = localStorage.getItem("sf_role");
    const name  = localStorage.getItem("sf_name") || "";
    const email = localStorage.getItem("sf_email") || "";

    if (!token || role !== "admin") {
      window.location.href = "/login";
    }

    document.getElementById("welcome").textContent =
      `Hi, ${name || "Admin"} (${role})`;

    function logout() {
      localStorage.removeItem("sf_token");
      localStorage.removeItem("sf_role");
      localStorage.removeItem("sf_name");
      localStorage.removeItem("sf_email");
      localStorage.removeItem("sf_profile");
      window.location.href = "/";
    }

    async function openSection(section) {
      const content = document.getElementById("content");

      if (section === "overview") {
        content.innerHTML = `
          <h2>Overview</h2>
          <p>Quick snapshot of your portal. Use other cards to drill down into specific data.</p>
          <div class="item"><strong>Courses:</strong> View and manage available courses.</div>
          <div class="item"><strong>Announcements:</strong> Share updates with all students.</div>
          <div class="item"><strong>Messages:</strong> Reply to student queries.</div>
        `;
        return;
      }

      if (section === "courses") {
        content.innerHTML = "<h2>Courses</h2><p>Loading...</p>";
        const res = await fetch("/api/courses", {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        content.innerHTML = "<h2>Courses</h2>" +
          data.map(c => `<div class="item"><strong>${c.title}</strong> - ${c.level}</div>`).join("");
        return;
      }

      if (section === "exams") {
        content.innerHTML = "<h2>Exams</h2><p>Loading...</p>";
        const res = await fetch("/api/exams", {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        content.innerHTML = "<h2>Exams</h2>" +
          data.map(ex => `<div class="item"><strong>${ex.name}</strong> - ${ex.course} - ${ex.date}</div>`).join("");
        return;
      }

      if (section === "quizzes") {
        content.innerHTML = "<h2>Quizzes</h2><p>Loading...</p>";
        const res = await fetch("/api/quizzes", {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        content.innerHTML = "<h2>Quizzes</h2>" +
          data.map(q => `<div class="item"><strong>${q.name}</strong> - Score (example student): ${q.score}</div>`).join("");
        return;
      }

      if (section === "announcements") {
        content.innerHTML = `
          <h2>Post Announcement</h2>
          <form class="form" onsubmit="postAnnouncement(event)">
            <label>Title</label>
            <input id="a_title" required>
            <label>Message</label>
            <textarea id="a_text" rows="3" required></textarea>
            <button type="submit">Publish</button>
          </form>
          <h3 style="margin-top:18px;">Existing Announcements</h3>
          <div id="annList">Loading...</div>
        `;
        loadAnnouncementsForAdmin();
        return;
      }

      if (section === "messages") {
        content.innerHTML = `
          <h2>Student Messages</h2>
          <div id="msgList" style="max-height:320px;overflow-y:auto;margin-bottom:10px;"></div>
          <h3>Reply to a Student</h3>
          <form class="form" onsubmit="sendAdminReply(event)">
            <label>Student Email (to)</label>
            <input id="m_to" type="email" placeholder="student@example.com" required>
            <label>Message</label>
            <textarea id="m_text" rows="2" required></textarea>
            <button type="submit">Send Reply</button>
          </form>
        `;
        loadMessagesForAdmin();
        return;
      }
    }

    async function loadAnnouncementsForAdmin() {
      const res = await fetch("/api/announcements", {
        headers: { "Authorization": "Bearer " + token }
      });
      const data = await res.json();
      const list = document.getElementById("annList");
      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = "<p>No announcements yet.</p>";
        return;
      }
      list.innerHTML = data
        .map(a => {
          const d = a.createdAt ? new Date(a.createdAt) : null;
          const when = d ? d.toLocaleString() : "Unknown time";
          return `
            <div class="item">
              <strong>${a.title}</strong><br>
              <small>Announced on: ${when}</small><br>
              ${a.text}
            </div>
          `;
        })
        .join("");
    }

    async function postAnnouncement(e) {
      e.preventDefault();
      const title = document.getElementById("a_title").value.trim();
      const text  = document.getElementById("a_text").value.trim();
      if (!title || !text) return;

      const res = await fetch("/api/announcements", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title, text })
      });

      const data = await res.json();
      if (!res.ok) {
        alert(data.error || "Failed to publish announcement");
        return;
      }

      document.getElementById("a_title").value = "";
      document.getElementById("a_text").value = "";
      loadAnnouncementsForAdmin();
    }

    async function loadMessagesForAdmin() {
      const res = await fetch("/api/messages", {
        headers: { "Authorization": "Bearer " + token }
      });
      const data = await res.json();
      const box = document.getElementById("msgList");
      if (!Array.isArray(data) || data.length === 0) {
        box.innerHTML = "<p>No messages yet.</p>";
        return;
      }
      box.innerHTML = data
        .map(m => `
          <div class="item">
            <strong>From:</strong> ${m.fromName || m.from} (${m.from})<br>
            <strong>To:</strong> ${m.to}<br>
            ${m.text}
          </div>
        `)
        .join("");
    }

    async function sendAdminReply(e) {
      e.preventDefault();
      const to = document.getElementById("m_to").value.trim();
      const text = document.getElementById("m_text").value.trim();
      if (!to || !text) return;
      await fetch("/api/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          from: "admin",
          fromName: name || "Admin",
          to,
          text
        })
      });
      document.getElementById("m_text").value = "";
      loadMessagesForAdmin();
    }
  </script>
</body>
</html>
