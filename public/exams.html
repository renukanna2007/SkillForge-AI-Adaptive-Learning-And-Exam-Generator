<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SkillForge • Exams</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1f2937;
      background: #030712;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .left-head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .left-head h1 {
      font-size: 20px;
      font-weight: 600;
    }
    .left-head small {
      font-size: 12px;
      color: #9ca3af;
    }
    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-right button {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
    }

    main {
      flex: 1;
      padding: 20px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .back-link {
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .section-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 12px;
    }
    .table th, .table td {
      border-bottom: 1px solid #111827;
      padding: 8px 6px;
      text-align: left;
    }
    .table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #9ca3af;
      background: #020617;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      border: 1px solid #1f2937;
    }
    .tag-upcoming {
      border-color: #60a5fa;
      color: #bfdbfe;
      background: rgba(37, 99, 235, 0.15);
    }
    .tag-completed {
      border-color: #16a34a;
      color: #bbf7d0;
      background: rgba(22, 163, 74, 0.12);
    }
    .empty-text {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<header>
  <div class="left-head">
    <h1>Exams</h1>
    <small id="studentMeta">Loading student info…</small>
  </div>
  <div class="top-right">
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<main>
  <a class="back-link" href="/student-dashboard">
    ← Back to dashboard
  </a>

  <h2 class="section-title">Scheduled exams</h2>
  <p class="section-sub">These are manual exams created by admins for your courses.</p>

  <table class="table" id="examsTable">
    <thead>
      <tr>
        <th>Exam</th>
        <th>Course</th>
        <th>Type</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="examsTbody"></tbody>
  </table>
  <p class="empty-text" id="examsEmpty" style="display:none;">
    No exams have been scheduled yet.
  </p>
</main>

<script>
  const API_BASE = '';

  function getStoredStudent() {
    const name = localStorage.getItem('sf_name') || '';
    const email = localStorage.getItem('sf_email') || '';
    const role = localStorage.getItem('sf_role') || 'student';
    return { name, email, role };
  }

  function applyStudentInfo() {
    const { name, email } = getStoredStudent();
    const metaEl = document.getElementById('studentMeta');

    if (name) {
      metaEl.textContent = 'Signed in as ' + name;
    } else if (email) {
      metaEl.textContent = 'Signed in as ' + email;
    } else {
      metaEl.textContent = 'Signed in as student';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await fetch(API_BASE + '/api/auth/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {}
    localStorage.removeItem('sf_token');
    localStorage.removeItem('sf_role');
    localStorage.removeItem('sf_name');
    localStorage.removeItem('sf_email');
    window.location.href = '/login.html';
  });

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleString();
  }

  async function loadExams() {
    const token = localStorage.getItem('sf_token') || '';
    const headers = { 'Authorization': 'Bearer ' + token };

    const tbody = document.getElementById('examsTbody');
    const empty = document.getElementById('examsEmpty');
    tbody.innerHTML = '';
    empty.style.display = 'none';

    try {
      const res = await fetch(API_BASE + '/api/exams', {
        headers,
        credentials: 'include'
      });
      if (!res.ok) {
        empty.style.display = 'block';
        empty.textContent = 'Failed to load exams.';
        return;
      }
      const exams = await res.json();
      console.log('EXAMS PAGE DATA', exams);

      if (!exams.length) {
        empty.style.display = 'block';
        return;
      }

      exams.forEach(e => {
        const tr = document.createElement('tr');

        const status = e.end_time && new Date(e.end_time) < new Date()
          ? 'completed'
          : 'upcoming';

        const tagClass = status === 'completed' ? 'tag-completed' : 'tag-upcoming';
        const tagLabel = status === 'completed' ? 'Completed' : 'Upcoming';

        tr.innerHTML = `
          <td>${e.title || 'Exam'}</td>
          <td>${e.course_title || '-'}</td>
          <td><span class="tag ${tagClass}">${tagLabel}</span></td>
          <td>${formatDate(e.start_time || e.created_at)}</td>
        `;
        tbody.appendChild(tr);
      });
    } catch (e) {
      console.error('exams page error', e);
      empty.style.display = 'block';
      empty.textContent = 'Failed to load exams: ' + (e.message || e);
    }
  }

  applyStudentInfo();
  loadExams();
</script>
</body>
</html>
