<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quizzes – SkillForge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    .layout {
      display: grid;
      grid-template-columns: 1.2fr 2.2fr;
      gap: 16px;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    .card {
      background: #020617;
      border-radius: 12px;
      border: 1px solid #1f2937;
      padding: 14px;
    }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .card-sub { font-size: 12px; color: #9ca3af; margin-bottom: 10px; }

    .quiz-list {
      max-height: 420px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid #1f2937;
    }
    .quiz-item {
      padding: 8px 10px;
      border-bottom: 1px solid #111827;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .quiz-item:last-child { border-bottom: none; }
    .quiz-item:hover { background: #02041a; }
    .quiz-item.active {
      background: #111827;
      border-left: 3px solid #4f46e5;
    }
    .quiz-name { font-weight: 500; }
    .quiz-score { font-size: 12px; color: #9ca3af; }

    .back-link {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 13px;
      color: #60a5fa;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    .detail-label {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
    }
    .detail-value {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .attempt-pill {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      margin-left: 6px;
      border: 1px solid #1f2937;
    }
    .attempt-pill.ok {
      border-color: #22c55e;
      color: #bbf7d0;
    }
    .attempt-pill.na {
      border-color: #6b7280;
      color: #e5e7eb;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 13px;
      cursor: pointer;
      background: #4f46e5;
      color: #e5e7eb;
      margin-top: 10px;
    }
    .btn[disabled] {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-outline {
      background: transparent;
      border-color: #4b5563;
      color: #e5e7eb;
      margin-left: 8px;
    }

    .timer {
      font-size: 13px;
      margin-top: 4px;
      color: #facc15;
    }
    .timer.red { color: #f97373; }

    .question-box {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: #020617;
      max-height: 330px;
      overflow-y: auto;
    }
    .question-item {
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #111827;
    }
    .question-item:last-child { border-bottom: none; }
    .question-text { font-size: 14px; margin-bottom: 6px; }
    .options { list-style: none; margin-left: 4px; }
    .options li {
      margin-bottom: 4px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-box {
      margin-top: 8px;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #022c22;
      color: #bbf7d0;
      border: 1px solid #065f46;
      display: none;
    }
  </style>
</head>
<body>
  <a href="/student-dashboard" class="back-link">← Back to dashboard</a>
  <h1>Quizzes</h1>

  <div class="layout">
    <!-- LEFT: list -->
    <div class="card">
      <div class="card-title">Available quizzes</div>
      <div class="card-sub">Click a quiz to see its details and start it.</div>
      <div id="quizList" class="quiz-list">
        <div class="quiz-item">
          <span class="quiz-name">Loading...</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: details + quiz play -->
    <div class="card" id="detailCard">
      <div class="card-title" id="detailTitle">Select a quiz</div>
      <div class="card-sub" id="detailSubtitle">
        Choose a quiz from the left to view info and start the quiz.
      </div>

      <div id="detailBody" style="display:none;">
        <div class="detail-label">Quiz name</div>
        <div class="detail-value" id="dName"></div>

        <div class="detail-label">Course</div>
        <div class="detail-value" id="dCourse"></div>

        <div class="detail-label">Maximum score</div>
        <div class="detail-value" id="dMaxScore"></div>

        <div class="detail-label">Created at</div>
        <div class="detail-value" id="dCreated"></div>

        <div class="detail-label">Your latest attempt</div>
        <div class="detail-value" id="dAttempt"></div>

        <button id="startBtn" class="btn">Start quiz</button>
        <button id="submitBtn" class="btn btn-outline" disabled>Submit now</button>
        <div id="timer" class="timer" style="display:none;"></div>

        <div id="scoreBox" class="score-box"></div>

        <div id="questionsBox" class="question-box" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    let currentQuiz = null;
    let currentQuestions = [];
    let selectedAnswers = {}; // questionId -> chosenIndex
    let timerId = null;
    let timeLeft = 0; // in seconds

    function formatDateTime(dt) {
      if (!dt) return '';
      const d = new Date(dt);
      if (isNaN(d.getTime())) return dt;
      return d.toLocaleString();
    }

    function clearTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      const timerEl = document.getElementById('timer');
      timerEl.style.display = 'none';
      timerEl.classList.remove('red');
      timerEl.textContent = '';
    }

    function startTimer(seconds) {
      clearTimer();
      timeLeft = seconds;
      const timerEl = document.getElementById('timer');
      timerEl.style.display = 'block';

      const update = () => {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timerEl.textContent = `Time left: ${m}:${String(s).padStart(2, '0')}`;
        if (timeLeft <= 10) {
          timerEl.classList.add('red');
        }
        if (timeLeft <= 0) {
          clearTimer();
          autoSubmitOnTimeUp();
        }
        timeLeft--;
      };

      update();
      timerId = setInterval(update, 1000);
    }

    function autoSubmitOnTimeUp() {
      const submitBtn = document.getElementById('submitBtn');
      if (!submitBtn.disabled) {
        submitQuiz();
      }
    }

    async function loadQuizzes() {
      const token = localStorage.getItem('sf_token') || '';
      const listEl = document.getElementById('quizList');
      listEl.innerHTML = '<div class="quiz-item"><span class="quiz-name">Loading...</span></div>';

      try {
        const res = await fetch(API_BASE + '/api/quizzes-with-status', {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) {
          listEl.innerHTML = '<div class="quiz-item"><span class="quiz-name">Failed to load quizzes.</span></div>';
          return;
        }
        const rows = await res.json();
        if (!rows.length) {
          listEl.innerHTML = '<div class="quiz-item"><span class="quiz-name">No quizzes available.</span></div>';
          return;
        }

        listEl.innerHTML = '';
        rows.forEach(q => {
          const item = document.createElement('div');
          item.className = 'quiz-item';
          item.dataset.id = q.id;

          const left = document.createElement('span');
          left.className = 'quiz-name';
          left.textContent = q.name;

          const right = document.createElement('span');
          right.className = 'quiz-score';

          if (q.result_id) {
            right.textContent = `Attempted: ${q.attempt_score}/${q.max_score}`;
          } else {
            right.textContent = 'Not attempted';
          }

          item.appendChild(left);
          item.appendChild(right);

          item.addEventListener('click', () => {
            document.querySelectorAll('.quiz-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            showDetails(q);
          });

          listEl.appendChild(item);
        });

        const first = rows[0];
        const firstItem = listEl.querySelector('.quiz-item');
        if (first && firstItem) {
          firstItem.classList.add('active');
          showDetails(first);
        }
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<div class="quiz-item"><span class="quiz-name">Error loading quizzes.</span></div>';
      }
    }

    function showDetails(q) {
      currentQuiz = q;
      currentQuestions = [];
      selectedAnswers = {};
      clearTimer();

      const scoreBox = document.getElementById('scoreBox');
      scoreBox.style.display = 'none';
      scoreBox.textContent = '';

      const qBox = document.getElementById('questionsBox');
      qBox.style.display = 'none';
      qBox.innerHTML = '';

      const startBtn = document.getElementById('startBtn');
      const submitBtn = document.getElementById('submitBtn');
      startBtn.disabled = false;
      submitBtn.disabled = true;

      document.getElementById('detailBody').style.display = 'block';
      document.getElementById('detailTitle').textContent = q.name;
      document.getElementById('detailSubtitle').textContent = 'Quiz information and your attempt.';

      document.getElementById('dName').textContent = q.name || '-';
      const course = q.course_name || (q.course_id ? ('Course #' + q.course_id) : '—');
      document.getElementById('dCourse').textContent = course;
      document.getElementById('dMaxScore').textContent = (q.max_score ?? 0) + ' points';
      document.getElementById('dCreated').textContent = formatDateTime(q.created_at);

      const attemptEl = document.getElementById('dAttempt');
      attemptEl.innerHTML = '';

      if (q.result_id) {
        const span = document.createElement('span');
        span.textContent =
          `You attempted this quiz and scored ${q.attempt_score}/${q.max_score} on ${formatDateTime(q.attempted_at)}.`;

        const pill = document.createElement('span');
        pill.className = 'attempt-pill ok';
        pill.textContent = 'Attempted';

        attemptEl.appendChild(span);
        attemptEl.appendChild(pill);
      } else {
        const span = document.createElement('span');
        span.textContent = 'You have not attempted this quiz yet.';
        const pill = document.createElement('span');
        pill.className = 'attempt-pill na';
        pill.textContent = 'Not attempted';

        attemptEl.appendChild(span);
        attemptEl.appendChild(pill);
      }
    }

    async function startQuiz() {
      if (!currentQuiz) return;
      const token = localStorage.getItem('sf_token') || '';
      const quizId = currentQuiz.id;
      const startBtn = document.getElementById('startBtn');
      const submitBtn = document.getElementById('submitBtn');
      const qBox = document.getElementById('questionsBox');
      const scoreBox = document.getElementById('scoreBox');

      startBtn.disabled = true;
      submitBtn.disabled = true;
      qBox.innerHTML = 'Loading questions...';
      qBox.style.display = 'block';
      scoreBox.style.display = 'none';
      scoreBox.textContent = '';

      try {
        const res = await fetch(`/api/quizzes/${quizId}/questions`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) {
          qBox.innerHTML = 'Failed to load questions.';
          return;
        }
        const questions = await res.json();
        currentQuestions = questions;
        selectedAnswers = {};
        renderQuestions();
        submitBtn.disabled = false;

        startTimer(5 * 60); // 5 minutes
      } catch (err) {
        console.error(err);
        qBox.innerHTML = 'Error loading questions.';
      }
    }

    function renderQuestions() {
      const qBox = document.getElementById('questionsBox');
      qBox.innerHTML = '';
      if (!currentQuestions.length) {
        qBox.textContent = 'No questions configured for this quiz yet.';
        return;
      }

      currentQuestions.forEach((q, index) => {
        const wrap = document.createElement('div');
        wrap.className = 'question-item';

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = `${index + 1}. ${q.question}`;
        wrap.appendChild(qText);

        const ul = document.createElement('ul');
        ul.className = 'options';

        q.options.forEach((opt, optIdx) => {
          const li = document.createElement('li');

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'q_' + q.id;
          input.value = optIdx;
          input.addEventListener('change', () => {
            selectedAnswers[q.id] = optIdx;
          });

          const label = document.createElement('label');
          label.textContent = opt;

          li.appendChild(input);
          li.appendChild(label);
          ul.appendChild(li);
        });

        wrap.appendChild(ul);
        qBox.appendChild(wrap);
      });
    }

    async function submitQuiz() {
      if (!currentQuiz || !currentQuestions.length) return;
      const token = localStorage.getItem('sf_token') || '';
      const quizId = currentQuiz.id;
      const submitBtn = document.getElementById('submitBtn');
      const startBtn = document.getElementById('startBtn');
      const scoreBox = document.getElementById('scoreBox');

      submitBtn.disabled = true;
      startBtn.disabled = false;
      clearTimer();

      const answers = currentQuestions.map(q => ({
        questionId: q.id,
        chosenIndex: selectedAnswers[q.id] ?? -1
      }));

      try {
        const res = await fetch(`/api/quizzes/${quizId}/submit`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token
          },
          body: JSON.stringify({ answers })
        });

        if (!res.ok) {
          scoreBox.style.display = 'block';
          scoreBox.style.background = '#450a0a';
          scoreBox.style.borderColor = '#b91c1c';
          scoreBox.style.color = '#fecaca';
          scoreBox.textContent = 'Failed to submit quiz.';
          return;
        }

        const data = await res.json();
        scoreBox.style.display = 'block';
        scoreBox.style.background = '#022c22';
        scoreBox.style.borderColor = '#065f46';
        scoreBox.style.color = '#bbf7d0';
        scoreBox.textContent =
          `You answered ${data.correctCount}/${data.totalQuestions} correctly. ` +
          `Score: ${data.score}/${data.maxScore}.`;

        loadQuizzes();
      } catch (err) {
        console.error(err);
        scoreBox.style.display = 'block';
        scoreBox.style.background = '#450a0a';
        scoreBox.style.borderColor = '#b91c1c';
        scoreBox.style.color = '#fecaca';
        scoreBox.textContent = 'Error submitting quiz.';
      }
    }

    document.getElementById('startBtn').addEventListener('click', startQuiz);
    document.getElementById('submitBtn').addEventListener('click', submitQuiz);

    loadQuizzes();
  </script>
</body>
</html>
