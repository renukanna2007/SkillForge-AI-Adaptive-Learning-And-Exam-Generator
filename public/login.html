<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SkillForge | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      width: 100%;
      max-width: 430px;
      background: rgba(15, 23, 42, 0.96);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.75);
      padding: 1.8rem 1.9rem 1.7rem;
    }
    .brand {
      margin-bottom: 1.4rem;
    }
    .brand-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #f9fafb;
    }
    .brand-subtitle {
      margin-top: 0.3rem;
      font-size: 0.9rem;
      color: #9ca3af;
    }
    h1 {
      font-size: 1.35rem;
      margin-bottom: 0.25rem;
    }
    .desc {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 1.1rem;
    }
    .role-toggle {
      display: inline-flex;
      border-radius: 999px;
      padding: 0.18rem;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.7);
      margin-bottom: 1rem;
    }
    .role-option {
      padding: 0.35rem 0.8rem;
      font-size: 0.82rem;
      cursor: pointer;
      border-radius: 999px;
      color: #9ca3af;
      border: none;
      background: transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .role-option.active {
      background: linear-gradient(to right, #38bdf8, #22c55e);
      color: #0f172a;
      font-weight: 600;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    label {
      font-size: 0.85rem;
      color: #e5e7eb;
      margin-bottom: 0.15rem;
      display: block;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      padding: 0.5rem 0.9rem;
      background: rgba(15, 23, 42, 0.92);
      color: #e5e7eb;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.5);
      background: rgba(15, 23, 42, 0.98);
    }

    .actions {
      margin-top: 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .btn-primary {
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 0.55rem 0.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(to right, #38bdf8, #22c55e);
      color: #0f172a;
      box-shadow: 0 12px 25px rgba(34, 197, 94, 0.35);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
    }
    .btn-primary:hover {
      filter: brightness(1.03);
      box-shadow: 0 16px 32px rgba(34, 197, 94, 0.45);
    }
    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
    }

    .oauth-buttons {
      margin-top: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .btn-oauth {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.8);
      padding: 0.5rem 0.8rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .btn-oauth:hover {
      background: rgba(15, 23, 42, 1);
      border-color: #38bdf8;
    }

    .link-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 0.4rem;
    }
    .link-row a {
      color: #38bdf8;
      text-decoration: none;
    }
    .link-row a:hover {
      text-decoration: underline;
    }

    .error {
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: #fecaca;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-title">SkillForge</div>
      <p class="brand-subtitle">Sign in to your student or admin dashboard.</p>
    </div>

    <h1>Welcome back</h1>
    <p class="desc">Use your email and password. Choose your role correctly (student/admin).</p>

    <div class="role-toggle">
      <button type="button" class="role-option active" data-role="student">Student</button>
      <button type="button" class="role-option" data-role="admin">Admin</button>
    </div>

    <form id="login-form">
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>

      <div class="actions">
        <button class="btn-primary" type="submit">Login</button>
      </div>
    </form>

    <div class="oauth-buttons">
      <button class="btn-oauth" onclick="window.location.href='/auth/google'">
        Continue with Google
      </button>
      <button class="btn-oauth" onclick="window.location.href='/auth/github'">
        Continue with GitHub
      </button>
    </div>

    <div class="link-row">
      <span>New here? <a href="/register">Create an account</a></span>
      <a href="/auth">Back to Auth</a>
    </div>

    <div id="error" class="error"></div>
  </div>

  <script>
    // Role toggle
    let currentRole = "student";
    document.querySelectorAll(".role-option").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".role-option").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentRole = btn.dataset.role;
      });
    });

    // Handle email/password login
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        errorBox.textContent = "Please enter email and password.";
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, role: currentRole })
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || "Login failed. Please check your details.";
          return;
        }

        // Save JWT + role
        localStorage.setItem("sf_token", data.token);
        localStorage.setItem("sf_role", data.role);
        localStorage.setItem("sf_name", data.name || "");
        localStorage.setItem("sf_email", data.email || email);

        // Redirect based on role
        if (data.role === "admin") {
          window.location.href = "/admin-dashboard";
        } else {
          window.location.href = "/student-dashboard";
        }
      } catch (err) {
        console.error(err);
        errorBox.textContent = "Unable to connect to server. Please try again.";
      }
    });

    // Helper to read query parameters
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // Handle OAuth callback (Google/GitHub) and existing login
    (function handleOAuthRedirect() {
      const token = getQueryParam("token");
      const role = getQueryParam("role");

      if (token) {
        // Came back from Google/GitHub with JWT
        localStorage.setItem("sf_token", token);
        if (role) localStorage.setItem("sf_role", role);

        // Clear query params from URL
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        const finalRole = role || localStorage.getItem("sf_role") || "student";
        if (finalRole === "admin") {
          window.location.href = "/admin-dashboard";
        } else {
          window.location.href = "/student-dashboard";
        }
        return;
      }

      // Already logged in with JWT
      const existingToken = localStorage.getItem("sf_token");
      const existingRole = localStorage.getItem("sf_role");
      if (existingToken && existingRole === "admin") {
        window.location.href = "/admin-dashboard";
      } else if (existingToken && existingRole === "student") {
        window.location.href = "/student-dashboard";
      }
    })();
  </script>
</body>
</html>
