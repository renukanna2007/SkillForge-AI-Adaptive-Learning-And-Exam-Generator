<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillForge - AI Exams</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family:'Segoe UI',sans-serif;
      margin:0;
      min-height:100vh;
      background:linear-gradient(135deg,#020617,#0f172a,#0f766e);
      color:white;
      padding:20px;
    }
    .shell{ max-width:1100px; margin:0 auto; }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
      gap:10px;
    }
    .back-btn, .logout-btn{
      border:none;
      padding:8px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }
    .back-btn{ background:#0f766e; color:white; }
    .logout-btn{ background:#ef4444; color:white; }

    .layout{
      display:grid;
      grid-template-columns:280px 1fr;
      gap:16px;
    }
    @media (max-width:800px){
      .layout{ grid-template-columns:1fr; }
    }

    .panel{
      background:white;
      border-radius:16px;
      padding:16px;
      color:#0f172a;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }
    .exam-item{
      padding:8px;
      border-radius:10px;
      margin-bottom:6px;
      cursor:pointer;
      background:#f9fafb;
      border-left:4px solid transparent;
    }
    .exam-item.active{
      border-left-color:#0f766e;
      background:#e0f2fe;
    }
    .question-block{
      margin-bottom:12px;
      padding:10px;
      background:#f9fafb;
      border-radius:10px;
      border-left:4px solid #0f766e;
      font-size:14px;
    }
    .options{
      margin-top:6px;
    }
    .options label{
      display:block;
      margin-bottom:4px;
      cursor:pointer;
    }
    .submit-btn{
      margin-top:12px;
      padding:8px 18px;
      border-radius:10px;
      border:none;
      background:#0f766e;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
    .score-banner{
      margin-top:10px;
      padding:8px 12px;
      border-radius:10px;
      background:#ecfdf5;
      color:#065f46;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <h2>🤖 AI Exams</h2>
      <div>
        <button class="back-btn" onclick="goDashboard()">← Back to Dashboard</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="layout">
      <div class="panel">
        <h3>Available AI Exams</h3>
        <div id="examList">Loading...</div>
      </div>
      <div class="panel">
        <div id="examDetail">
          <p>Select an exam from the left to start.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("sf_token");
    const role  = localStorage.getItem("sf_role");

    if (!token || role !== "student") {
      window.location.href = "/login.html";
    }

    let currentExamId = null;
    let currentQuestions = [];

    function logout(){
      localStorage.clear();
      window.location.href = "/";
    }
    function goDashboard(){
      window.location.href = "/student-dashboard";
    }

    // 1) Load AI exams list
    async function loadExamList(){
      const box = document.getElementById("examList");
      try{
        const res = await fetch("/api/ai-exams", {
          headers:{ "Authorization":"Bearer "+token }
        });
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0){
          box.innerHTML = "<p>No AI exams available.</p>";
          return;
        }

        box.innerHTML = data.map(ex => {
          // ai_exams: id, topic, difficulty, num_questions, created_at
          const d = ex.created_at ? new Date(ex.created_at) : null;
          const when = d ? d.toLocaleString() : "Unknown time";
          const diff = ex.difficulty || "medium";
          const label = ex.topic || `Exam #${ex.id}`;
          const total = ex.num_questions || "?";
          return `
            <div class="exam-item" data-id="${ex.id}" onclick="selectExam('${ex.id}', this)">
              <strong>${label}</strong><br>
              <small>${diff} • ${total} Qs • ${when}</small>
            </div>
          `;
        }).join("");
      }catch(e){
        console.error(e);
        box.innerHTML = "<p>Failed to load exams.</p>";
      }
    }

    // 2) Select exam and load questions
    async function selectExam(id, el){
      currentExamId = id;
      document.querySelectorAll(".exam-item").forEach(i => i.classList.remove("active"));
      if (el) el.classList.add("active");
      const detail = document.getElementById("examDetail");
      detail.innerHTML = "<p>Loading exam...</p>";

      try{
        const res = await fetch("/api/ai-exams/"+id, {
          headers:{ "Authorization":"Bearer "+token }
        });
        const data = await res.json();

        // backend returns: { exam: {...}, questions: [...] }
        const exam = data.exam || {};
        const questions = Array.isArray(data.questions) ? data.questions : [];

        if (!questions.length){
          detail.innerHTML = "<p>No questions found for this exam.</p>";
          return;
        }

        currentQuestions = questions;

        const totalQs = exam.num_questions || questions.length;
        const topic = exam.title || exam.topic || "AI Exam";
        const diff = exam.difficulty || "Mixed";

        detail.innerHTML = `
          <h3>${topic} (${diff})</h3>
          <p>Total questions: ${totalQs}</p>
          <form id="examForm">
            ${questions.map((q,idx) => `
              <div class="question-block">
                <div><strong>Q${idx+1}.</strong> ${q.question}</div>
                <div class="options">
                  ${(q.options || []).map((opt,optIdx)=>`
                    <label>
                      <input type="radio" name="q_${q.id}" value="${optIdx}">
                      ${String.fromCharCode(65+optIdx)}. ${opt}
                    </label>
                  `).join("")}
                </div>
              </div>
            `).join("")}
            <button type="button" class="submit-btn" onclick="submitExam()">Submit Exam</button>
          </form>
          <div id="scoreBox"></div>
        `;
      }catch(e){
        console.error(e);
        detail.innerHTML = "<p>Error loading exam.</p>";
      }
    }

    // 3) Submit exam
    async function submitExam(){
      if (!currentExamId || !currentQuestions.length) return;
      const form = document.getElementById("examForm");
      const answers = [];

      currentQuestions.forEach(q => {
        const field = form.querySelector(`input[name="q_${q.id}"]:checked`);
        if (field){
          answers.push({
            questionId: q.id,
            chosenOptionIndex: parseInt(field.value,10)
          });
        }
      });

      if (answers.length === 0){
        alert("Please answer at least one question before submitting.");
        return;
      }

      try{
        const res = await fetch("/api/ai-exams/"+currentExamId+"/submit", {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
          },
          body:JSON.stringify({ answers })
        });
        const data = await res.json();
        if (!res.ok){
          alert(data.message || data.error || "Failed to submit exam");
          return;
        }
        const box = document.getElementById("scoreBox");
        box.innerHTML = `
          <div class="score-banner">
            You scored <strong>${data.score}</strong> out of <strong>${data.total}</strong>.
          </div>
        `;
      }catch(e){
        console.error(e);
        alert("Error submitting exam.");
      }
    }

    loadExamList();
  </script>
</body>
</html>
