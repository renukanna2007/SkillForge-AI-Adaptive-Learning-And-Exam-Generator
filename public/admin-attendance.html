<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SkillForge • Admin Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1f2937;
      background: #030712;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .left-head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .left-head h1 {
      font-size: 20px;
      font-weight: 600;
    }
    .left-head small {
      font-size: 12px;
      color: #9ca3af;
    }
    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-right button {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
    }

    main {
      flex: 1;
      padding: 20px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .back-link {
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .section-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .filters select {
      background: #020617;
      color: #e5e7eb;
      border-radius: 999px;
      border: 1px solid #374151;
      padding: 4px 8px;
      font-size: 12px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      font-size: 12px;
    }
    .table th, .table td {
      border-bottom: 1px solid #111827;
      padding: 8px 6px;
      text-align: left;
    }
    .table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #9ca3af;
      background: #020617;
    }

    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      border: 1px solid #1f2937;
    }
    .tag-green {
      border-color: #16a34a;
      color: #bbf7d0;
      background: rgba(22, 163, 74, 0.12);
    }
    .tag-red {
      border-color: #dc2626;
      color: #fecaca;
      background: rgba(220, 38, 38, 0.12);
    }

    .empty-text {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<header>
  <div class="left-head">
    <h1>Attendance</h1>
    <small id="adminMeta">Loading admin info…</small>
  </div>
  <div class="top-right">
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<main>
  <a class="back-link" href="/admin-dashboard">
    ← Back to admin dashboard
  </a>

  <h2 class="section-title">Student attendance</h2>
  <p class="section-sub">View recorded attendance by date, student, and course.</p>

  <div class="filters">
    <label>
      Course:
      <select id="courseFilter">
        <option value="">All</option>
      </select>
    </label>
    <label>
      Date:
      <select id="dateFilter">
        <option value="">All</option>
      </select>
    </label>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Student</th>
        <th>Course</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="attTbody"></tbody>
  </table>
  <p class="empty-text" id="attEmpty" style="display:none;">
    No attendance records found.
  </p>
</main>

<script>
  const API_BASE = '';

  function getStoredAdmin() {
    const name = localStorage.getItem('sf_name') || '';
    const email = localStorage.getItem('sf_email') || '';
    const role = localStorage.getItem('sf_role') || '';
    return { name, email, role };
  }

  function applyAdminInfo() {
    const { name, email } = getStoredAdmin();
    const metaEl = document.getElementById('adminMeta');

    if (name) {
      metaEl.textContent = 'Signed in as ' + name + ' (admin)';
    } else if (email) {
      metaEl.textContent = 'Signed in as ' + email + ' (admin)';
    } else {
      metaEl.textContent = 'Signed in as admin';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await fetch(API_BASE + '/api/auth/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {}
    localStorage.removeItem('sf_token');
    localStorage.removeItem('sf_role');
    localStorage.removeItem('sf_name');
    localStorage.removeItem('sf_email');
    window.location.href = '/login.html';
  });

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString();
  }

  let allAttendance = [];

  function populateFilters() {
    const courseSel = document.getElementById('courseFilter');
    const dateSel = document.getElementById('dateFilter');

    const courseSet = new Set();
    const dateSet = new Set();

    allAttendance.forEach(r => {
      if (r.course_title) courseSet.add(r.course_title);
      if (r.date) dateSet.add(r.date);
    });

    courseSel.innerHTML = '<option value="">All</option>';
    dateSel.innerHTML = '<option value="">All</option>';

    Array.from(courseSet).sort().forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      courseSel.appendChild(opt);
    });

    Array.from(dateSet).sort().forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      dateSel.appendChild(opt);
    });
  }

  function renderAttendance() {
    const tbody = document.getElementById('attTbody');
    const empty = document.getElementById('attEmpty');
    const courseSel = document.getElementById('courseFilter');
    const dateSel = document.getElementById('dateFilter');

    const courseVal = courseSel.value;
    const dateVal = dateSel.value;

    tbody.innerHTML = '';

    const filtered = allAttendance.filter(r => {
      if (courseVal && r.course_title !== courseVal) return false;
      if (dateVal && r.date !== dateVal) return false;
      return true;
    });

    if (!filtered.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    filtered.forEach(r => {
      const tr = document.createElement('tr');
      const present = !!r.present;

      tr.innerHTML = `
        <td>${r.date || formatDate(r.created_at)}</td>
        <td>${r.student_name || r.student_email || '-'}</td>
        <td>${r.course_title || '-'}</td>
        <td>
          <span class="tag ${present ? 'tag-green' : 'tag-red'}">
            ${present ? 'Present' : 'Absent'}
          </span>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function loadAttendance() {
    const token = localStorage.getItem('sf_token') || '';
    const headers = { 'Authorization': 'Bearer ' + token };

    try {
      const res = await fetch(API_BASE + '/api/admin/attendance', {
        headers,
        credentials: 'include'
      });
      if (!res.ok) {
        console.error('Failed to load admin attendance');
        document.getElementById('attEmpty').style.display = 'block';
        document.getElementById('attEmpty').textContent = 'Failed to load attendance.';
        return;
      }
      allAttendance = await res.json();
      console.log('ADMIN ATTENDANCE DATA', allAttendance);

      populateFilters();
      renderAttendance();
    } catch (e) {
      console.error('admin attendance page error', e);
      const empty = document.getElementById('attEmpty');
      empty.style.display = 'block';
      empty.textContent = 'Failed to load attendance: ' + (e.message || e);
    }
  }

  document.getElementById('courseFilter').addEventListener('change', renderAttendance);
  document.getElementById('dateFilter').addEventListener('change', renderAttendance);

  applyAdminInfo();
  loadAttendance();
</script>
</body>
</html>
