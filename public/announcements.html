<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SkillForge • Announcements</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1f2937;
      background: #030712;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .left-head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .left-head h1 {
      font-size: 20px;
      font-weight: 600;
    }
    .left-head small {
      font-size: 12px;
      color: #9ca3af;
    }
    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-right button {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
    }

    main {
      flex: 1;
      padding: 20px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .back-link {
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .section-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .ann-card {
      border-radius: 12px;
      border: 1px solid #1f2937;
      background: #020617;
      padding: 12px 12px;
      margin-bottom: 10px;
    }
    .ann-title-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .ann-title {
      font-size: 14px;
      font-weight: 600;
    }
    .ann-meta {
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
    }
    .ann-content {
      font-size: 12px;
      color: #d1d5db;
      margin-top: 4px;
      white-space: pre-wrap;
    }
    .ann-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      color: #e5e7eb;
      margin-left: 6px;
    }
    .ann-badge-global {
      border-color: #6366f1;
      color: #c7d2fe;
      background: rgba(99, 102, 241, 0.08);
    }
    .empty-text {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<header>
  <div class="left-head">
    <h1>Announcements</h1>
    <small id="studentMeta">Loading student info…</small>
  </div>
  <div class="top-right">
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<main>
  <a class="back-link" href="/student-dashboard">
    ← Back to dashboard
  </a>

  <h2 class="section-title">Latest announcements</h2>
  <p class="section-sub">Announcements created by admins are shown here, newest first.</p>

  <div id="annListContainer"></div>
  <p class="empty-text" id="annEmpty" style="display:none;">
    No announcements yet.
  </p>
</main>

<script>
  const API_BASE = '';

  function getStoredStudent() {
    const name = localStorage.getItem('sf_name') || '';
    const email = localStorage.getItem('sf_email') || '';
    const role = localStorage.getItem('sf_role') || 'student';
    return { name, email, role };
  }

  // UPDATED: avoid backticks / template literals
  function applyStudentInfo() {
    const { name, email } = getStoredStudent();
    const metaEl = document.getElementById('studentMeta');

    if (name) {
      metaEl.textContent = 'Signed in as ' + name;
    } else if (email) {
      metaEl.textContent = 'Signed in as ' + email;
    } else {
      metaEl.textContent = 'Signed in as student';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await fetch(API_BASE + '/api/auth/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {}
    localStorage.removeItem('sf_token');
    localStorage.removeItem('sf_role');
    localStorage.removeItem('sf_name');
    localStorage.removeItem('sf_email');
    window.location.href = '/login.html';
  });

  function formatDateTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleString();
  }

  async function loadAnnouncements() {
    const token = localStorage.getItem('sf_token') || '';
    const headers = { 'Authorization': 'Bearer ' + token };

    const container = document.getElementById('annListContainer');
    const empty = document.getElementById('annEmpty');
    container.innerHTML = '';
    empty.style.display = 'none';

    try {
      const res = await fetch(API_BASE + '/api/announcements', {
        headers,
        credentials: 'include'
      });
      if (!res.ok) {
        empty.style.display = 'block';
        empty.textContent = 'Failed to load announcements.';
        return;
      }
      const anns = await res.json();
      console.log('ANNOUNCEMENTS PAGE DATA', anns);

      if (!anns.length) {
        empty.style.display = 'block';
        return;
      }

      anns.forEach(a => {
        const card = document.createElement('div');
        card.className = 'ann-card';

        const titleRow = document.createElement('div');
        titleRow.className = 'ann-title-row';

        const left = document.createElement('div');
        const title = document.createElement('div');
        title.className = 'ann-title';
        title.textContent = a.title || 'Announcement';

        const badgeWrap = document.createElement('span');
        badgeWrap.className = 'ann-badge' + (a.is_global ? ' ann-badge-global' : '');
        badgeWrap.textContent = a.is_global ? 'Global' : 'Course specific';

        left.appendChild(title);
        left.appendChild(badgeWrap);

        const meta = document.createElement('div');
        meta.className = 'ann-meta';
        meta.textContent = formatDateTime(a.created_at);

        titleRow.appendChild(left);
        titleRow.appendChild(meta);

        const content = document.createElement('div');
        content.className = 'ann-content';
        content.textContent = a.content || '';

        card.appendChild(titleRow);
        card.appendChild(content);

        container.appendChild(card);
      });
    } catch (e) {
      console.error('announcements page error', e);
      empty.style.display = 'block';
      empty.textContent = 'Failed to load announcements: ' + (e.message || e);
    }
  }

  applyStudentInfo();
  loadAnnouncements();
</script>
</body>
</html>
